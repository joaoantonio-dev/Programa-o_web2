<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxo - Mensagens</title>

    <link rel="stylesheet" href="css/default.css">

    <script src="js/jquery-3.6.4.min.js"></script>
    <script src="js/api.js"></script>
</head>

<body>

    <div class="page">

        <header>

            <div id="title">
                <img src="images/barco1.png" alt="ícone de barco">

                <div class="headtitle">
                    <h1>Luxo</h1>
                    <h2>Aluguel de iates</h2>
                </div>

            </div>

            <nav>
                <ul class="navmenu">
                    <li><a href="index.html">Página inicial</a></li>
                    <li><a href="aluguel.html">Aluguel de iates</a></li>
                    <li><a href="destinos.html">Destinos</a></li>
                    <li><a href="tripulacao.html">Tripulação</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="admin.html" class="accent">Mensagens</a></li>
                </ul>
            </nav>

        </header>

        <main>

            <div class="pagtitle">
                <div class="bgtitle"></div>
                <h2>Mensagens Recebidas</h2>
            </div>

            <table border="1" width="100%" id="tabelaMensagens">

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Mensagem</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </main>

    </div>

    <footer>
        <p>© 2023 por Luxo aluguel de iates</p>
    </footer>

    <script>

        $(document).ready(function () {

            var mensagens = obterMensagens();

            for (var i = 0; i < mensagens.length; i++) {

                var linha =
                    "<tr>" +
                    "<td>" + mensagens[i].nome + "</td>" +
                    "<td>" + mensagens[i].email + "</td>" +
                    "<td>" + mensagens[i].mensagem + "</td>" +
                    "</tr>";

                document.querySelector("#tabelaMensagens tbody").innerHTML += linha;
            }

        });

    </script>

</body>

</html>
